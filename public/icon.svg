<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Outer border with rounded corners matching the dashboard emblem -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="#0a0a0b" stroke="url(#emblemGradient)" stroke-width="2.5" />
  
  <!-- Linear Gradient definitions matching brand-electric, brand-purple, and pink-500 -->
  <defs>
    <linearGradient id="emblemGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D2FF" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
  </defs>

  <!-- Glowing Graduation Cap icon in the center -->
  <g transform="translate(14, 14) scale(1.5)" stroke="url(#emblemGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M12 2L2 7l10 5 10-5-10-5z" />
    <path d="M7 11.5V14a5 5 0 0 0 10 0v-2.5" />
    <path d="M12 22V12" stroke="#8b5cf6" />
  </g>
</svg>
